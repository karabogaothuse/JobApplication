<body>
    <div class="container">
        <h1>Job Application Form</h1>
        <p class="subtitle">Please fill in your details below</p>

        <form onsubmit="return validateForm()">
            <fieldset>
                <legend>Personal Information</legend>

                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email">

                <label for="telephone">Phone Number</label>
                <input type="tel" id="telephone" name="telephone">

                <label for="resume">Upload Resume</label>
                <input type="file" id="resume" name="resume">
            </fieldset>

            <fieldset>
                <legend>Position Information</legend>

                <label for="jobtitle">Desired Job Title</label>
                <select id="jobtitle" name="jobtitle">
                    <option>Software Developer</option>
                    <option>Web Designer</option>
                    <option>Data Analyst</option>
                </select>

                <label for="startdate">Available Start Date</label>
                <input type="date" id="startdate" name="startdate">
            </fieldset>

            <fieldset>
                <legend>Employment Type</legend>
                <div class="radio-group">
                    <label><input type="radio" name="employment"> Part-time Contract</label>
                    <label><input type="radio" name="employment"> Part-time Permanent</label>
                    <label><input type="radio" name="employment"> Full-time Contract</label>
                    <label><input type="radio" name="employment"> Full-time Permanent</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Areas of Interest</legend>
                <div class="checkbox-group">
                    <label><input type="checkbox"> Account Executive</label>
                    <label><input type="checkbox"> Business Development</label>
                    <label><input type="checkbox"> Inside Sales</label>
                    <label><input type="checkbox"> Sales Manager</label>
                    <label><input type="checkbox"> VP Sales</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Additional Information</legend>

                <label>Willing to Relocate?</label>
                <div class="radio-group">
                    <label><input type="radio" name="relocate"> Yes</label>
                    <label><input type="radio" name="relocate"> No</label>
                </div>

                <label for="message">Why are you suitable for this role?</label>
                <textarea id="message" name="message"></textarea>
            </fieldset>

            <button type="submit">Submit Application</button>
        </form>
    </div>
</body>
